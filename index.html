<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Video Generator</title>
    <script>
      // Blocking script: apply theme + locale before first paint to avoid FOUT/FOWT
      (() => {
        var d = document.documentElement;
        // Theme
        var t = localStorage.getItem("app-theme");
        d.dataset.theme = t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        // Locale
        var loc = localStorage.getItem("app-locale") || "en";
        d.lang = loc;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
